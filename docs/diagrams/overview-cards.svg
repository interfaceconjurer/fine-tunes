<svg fill="none" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        .container {
          font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
          padding: 24px;
          background: #ffffff;
          width: 100%;
          height: 100%;
        }

        .grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 16px;
          margin-bottom: 16px;
        }

        .card {
          background: #f6f8fa;
          border: 1px solid #d1d9e0;
          border-radius: 8px;
          padding: 20px;
          opacity: 0;
          animation: fadeInUp 0.6s ease-out forwards;
        }

        .card:nth-child(1) { animation-delay: 0s; }
        .card:nth-child(2) { animation-delay: 0.15s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card.full-width { animation-delay: 0.45s; }

        .card-icon {
          font-size: 32px;
          margin-bottom: 12px;
          display: block;
        }

        .card-title {
          font-size: 16px;
          font-weight: 600;
          color: #1f2328;
          margin-bottom: 8px;
          letter-spacing: 0.5px;
        }

        .card-desc {
          font-size: 14px;
          color: #656d76;
          line-height: 1.5;
        }

        .full-width {
          grid-column: 1 / -1;
        }

        @keyframes fadeInUp {
          from {
            opacity: 0;
            transform: translateY(8px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        @media (prefers-color-scheme: dark) {
          .container {
            background: #0d1117;
          }

          .card {
            background: #161b22;
            border-color: #30363d;
          }

          .card-title {
            color: #e6edf3;
          }

          .card-desc {
            color: #8b949e;
          }
        }
      </style>
      <div class="container">
        <div class="grid">
          <div class="card">
            <span class="card-icon">🎨</span>
            <div class="card-title">TRAIN</div>
            <div class="card-desc">Upload your reference images and train a style-specific LoRA model</div>
          </div>
          <div class="card">
            <span class="card-icon">📊</span>
            <div class="card-title">MONITOR</div>
            <div class="card-desc">Check training progress and get notified when complete</div>
          </div>
          <div class="card">
            <span class="card-icon">✨</span>
            <div class="card-title">GENERATE</div>
            <div class="card-desc">Create new images in your trained style with simple prompts</div>
          </div>
        </div>
        <div class="card full-width">
          <span class="card-icon">🔄</span>
          <div class="card-title">IMAGE-TO-IMAGE</div>
          <div class="card-desc">Transform existing images using your style · Apply artistic effects to photographs · Create variations of generated art</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
