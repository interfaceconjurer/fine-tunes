<svg fill="none" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        .container {
          font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
          padding: 32px;
          background: #ffffff;
          width: 100%;
          height: 100%;
        }

        .title {
          text-align: center;
          font-size: 16px;
          font-weight: 700;
          color: #1f2328;
          margin-bottom: 32px;
          letter-spacing: 0.5px;
        }

        .scale-container {
          max-width: 700px;
          margin: 0 auto;
        }

        .scale-bar-wrapper {
          position: relative;
          height: 40px;
          margin-bottom: 48px;
        }

        .scale-bar {
          height: 100%;
          background: linear-gradient(to right,
            #d1d9e0 0%,
            #58a6ff 25%,
            #1a7f37 50%,
            #d29922 75%,
            #cf222e 100%);
          border-radius: 20px;
          position: relative;
          overflow: hidden;
          transform-origin: left;
          transform: scaleX(0);
        }

        .container.animate .bar {
          animation: growBar 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .scale-labels {
          display: flex;
          justify-content: space-between;
          position: relative;
          margin-top: 12px;
        }

        .scale-tick {
          text-align: center;
          flex: 1;
          opacity: 0;
        }

        .container.animate .scale-tick {
          animation: fadeIn 0.4s ease-out forwards;
        }

        .container.animate .scale-tick:nth-child(1) { animation-delay: 1.1s; }
        .container.animate .scale-tick:nth-child(2) { animation-delay: 1.2s; }
        .container.animate .scale-tick:nth-child(3) { animation-delay: 1.3s; }
        .container.animate .scale-tick:nth-child(4) { animation-delay: 1.4s; }
        .container.animate .scale-tick:nth-child(5) { animation-delay: 1.5s; }

        .tick-value {
          font-size: 14px;
          font-weight: 700;
          color: #1f2328;
          margin-bottom: 4px;
        }

        .tick-label {
          font-size: 12px;
          color: #656d76;
          font-weight: 500;
        }

        .tick-desc {
          font-size: 11px;
          color: #8b949e;
          margin-top: 2px;
        }

        .sweet-spot {
          color: #1a7f37 !important;
        }

        .sweet-spot .tick-value {
          color: #1a7f37;
          font-size: 16px;
        }

        .sweet-spot .tick-label:after {
          content: " ⭐";
        }

        .warning {
          color: #cf222e !important;
        }

        .warning .tick-value {
          color: #cf222e;
        }

        .warning .tick-label:after {
          content: " ⚠️";
        }

        .subtitle {
          text-align: center;
          font-size: 12px;
          color: #656d76;
          margin-top: 24px;
          opacity: 0;
        }

        .container.animate .subtitle {
          animation: fadeIn 0.4s ease-out 1.6s forwards;
        }

        @keyframes growBar {
          to { transform: scaleX(1); }
        }

        @keyframes fadeIn {
          from { opacity: 0; }
          to { opacity: 1; }
        }

        @media (prefers-color-scheme: dark) {
          .container {
            background: #0d1117;
          }

          .title {
            color: #e6edf3;
          }

          .scale-bar {
            background: linear-gradient(to right,
              #30363d 0%,
              #58a6ff 25%,
              #3fb950 50%,
              #d29922 75%,
              #f85149 100%);
          }

          .tick-value {
            color: #e6edf3;
          }

          .tick-label {
            color: #8b949e;
          }

          .tick-desc {
            color: #6e7681;
          }

          .sweet-spot .tick-value {
            color: #3fb950;
          }

          .warning .tick-value {
            color: #f85149;
          }

          .subtitle {
            color: #8b949e;
          }
        }
      </style>
      <div class="container">
        <div class="title">LoRA Scale Visual Guide</div>
        <div class="scale-container">
          <div class="scale-bar-wrapper">
            <div class="scale-bar"></div>
          </div>
          <div class="scale-labels">
            <div class="scale-tick">
              <div class="tick-value">0.0</div>
              <div class="tick-label">No Style</div>
              <div class="tick-desc">(Base)</div>
            </div>
            <div class="scale-tick">
              <div class="tick-value">0.5</div>
              <div class="tick-label">Subtle</div>
              <div class="tick-desc">Influence</div>
            </div>
            <div class="scale-tick sweet-spot">
              <div class="tick-value">1.0</div>
              <div class="tick-label">Sweet Spot</div>
              <div class="tick-desc">Balanced</div>
            </div>
            <div class="scale-tick">
              <div class="tick-value">1.5</div>
              <div class="tick-label">Strong</div>
              <div class="tick-desc">Emphasis</div>
            </div>
            <div class="scale-tick warning">
              <div class="tick-value">2.0</div>
              <div class="tick-label">Too Much</div>
              <div class="tick-desc">Artifacts</div>
            </div>
          </div>
          <div class="subtitle">
            Less Style ←――――――――――――――――――――――――――――――→ More Style
          </div>
        </div>
      </div>
      <script>
        (function() {
          const container = document.querySelector('.container');
          const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                container.classList.add('animate');
                observer.unobserve(entry.target);
              }
            });
          }, { threshold: 0.2 });

          observer.observe(container);
        })();
      </script>
    </div>
  </foreignObject>
</svg>
