<svg fill="none" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        .container {
          font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
          padding: 32px;
          background: #ffffff;
          width: 100%;
          height: 100%;
        }

        .title {
          text-align: center;
          font-size: 18px;
          font-weight: 700;
          color: #1f2328;
          margin-bottom: 32px;
          letter-spacing: 1px;
          opacity: 0;
          animation: fadeIn 0.5s ease-out forwards;
        }

        .workflow {
          display: flex;
          align-items: flex-start;
          justify-content: space-between;
          gap: 24px;
        }

        .step-wrapper {
          flex: 1;
          display: flex;
          flex-direction: column;
          align-items: center;
          opacity: 0;
          animation: fadeInUp 0.6s ease-out forwards;
        }

        .step-wrapper:nth-child(1) { animation-delay: 0.1s; }
        .step-wrapper:nth-child(2) { animation-delay: 0.3s; }
        .step-wrapper:nth-child(3) { animation-delay: 0.5s; }

        .step {
          background: #f6f8fa;
          border: 2px solid #d1d9e0;
          border-radius: 10px;
          padding: 20px;
          width: 100%;
          text-align: center;
        }

        .step-icon {
          font-size: 32px;
          margin-bottom: 10px;
          display: block;
        }

        .step-title {
          font-size: 14px;
          font-weight: 700;
          color: #0969da;
          margin-bottom: 10px;
          letter-spacing: 0.5px;
        }

        .step-items {
          font-size: 12px;
          color: #656d76;
          line-height: 1.6;
        }

        .command {
          margin-top: 16px;
          padding: 8px 12px;
          background: #ffffff;
          border: 1px solid #d1d9e0;
          border-radius: 6px;
          font-family: "SF Mono", Monaco, "Cascadia Code", monospace;
          font-size: 11px;
          color: #8250df;
          text-align: center;
          width: 100%;
        }

        .arrow-wrapper {
          display: flex;
          align-items: center;
          height: 120px;
          opacity: 0;
          animation: fadeIn 0.4s ease-out forwards;
        }

        .arrow-wrapper:nth-child(2) { animation-delay: 0.25s; }
        .arrow-wrapper:nth-child(4) { animation-delay: 0.45s; }

        .arrow {
          font-size: 28px;
          color: #0969da;
        }

        @keyframes fadeInUp {
          from {
            opacity: 0;
            transform: translateY(8px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        @keyframes fadeIn {
          from { opacity: 0; }
          to { opacity: 1; }
        }

        @media (prefers-color-scheme: dark) {
          .container {
            background: #0d1117;
          }

          .title {
            color: #e6edf3;
          }

          .step {
            background: #161b22;
            border-color: #30363d;
          }

          .step-title {
            color: #58a6ff;
          }

          .step-items {
            color: #8b949e;
          }

          .command {
            background: #0d1117;
            border-color: #30363d;
            color: #bc8cff;
          }

          .arrow {
            color: #58a6ff;
          }
        }
      </style>
      <div class="container">
        <div class="title">FLUX WORKFLOW</div>
        <div class="workflow">
          <div class="step-wrapper">
            <div class="step">
              <span class="step-icon">🖼️</span>
              <div class="step-title">STEP 1</div>
              <div class="step-items">
                YOUR IMAGES<br/>
                2-20 images · Your style<br/>
                + captions
              </div>
            </div>
            <div class="command">
              Collect images +<br/>optional .txt captions
            </div>
          </div>

          <div class="arrow-wrapper">
            <span class="arrow">→</span>
          </div>

          <div class="step-wrapper">
            <div class="step">
              <span class="step-icon">🚀</span>
              <div class="step-title">STEP 2</div>
              <div class="step-items">
                TRAIN MODEL<br/>
                10-20 mins · ~$1.50<br/>
                GPU: T4
              </div>
            </div>
            <div class="command">
              flux_style_finetune.py<br/>train command
            </div>
          </div>

          <div class="arrow-wrapper">
            <span class="arrow">→</span>
          </div>

          <div class="step-wrapper">
            <div class="step">
              <span class="step-icon">🎨</span>
              <div class="step-title">STEP 3</div>
              <div class="step-items">
                GENERATE ART<br/>
                Text-to-Img<br/>
                Img-to-Img · Unlimited
              </div>
            </div>
            <div class="command">
              flux_style_finetune.py<br/>generate command
            </div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
