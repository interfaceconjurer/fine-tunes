<svg fill="none" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        .container {
          font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
          padding: 32px;
          background: #ffffff;
          width: 100%;
          height: 100%;
        }

        .section-title {
          text-align: center;
          font-size: 16px;
          font-weight: 700;
          color: #1f2328;
          margin-bottom: 24px;
          letter-spacing: 0.5px;
        }

        .tiers {
          display: flex;
          gap: 20px;
          justify-content: center;
          margin-bottom: 40px;
        }

        .tier {
          flex: 1;
          max-width: 260px;
          background: #f6f8fa;
          border: 2px solid #d1d9e0;
          border-radius: 12px;
          padding: 20px;
          opacity: 0;
          animation: fadeInUp 0.6s ease-out forwards;
        }

        .tier:nth-child(1) { animation-delay: 0.1s; }
        .tier:nth-child(2) { animation-delay: 0.3s; }
        .tier:nth-child(3) { animation-delay: 0.5s; }

        .tier.featured {
          border-color: #1a7f37;
          border-width: 3px;
          transform: scale(1.05);
          box-shadow: 0 8px 24px rgba(26, 127, 55, 0.15);
        }

        .tier-icon {
          font-size: 28px;
          text-align: center;
          margin-bottom: 8px;
          display: block;
        }

        .tier-name {
          font-size: 14px;
          font-weight: 700;
          color: #1f2328;
          text-align: center;
          margin-bottom: 4px;
        }

        .tier-badge {
          text-align: center;
          font-size: 11px;
          font-weight: 600;
          color: #1a7f37;
          margin-bottom: 12px;
          height: 14px;
        }

        .tier-specs {
          list-style: none;
          margin-bottom: 12px;
        }

        .tier-specs li {
          font-size: 12px;
          color: #656d76;
          padding: 5px 0;
          border-bottom: 1px solid #d1d9e0;
        }

        .tier-specs li:last-child {
          border-bottom: none;
        }

        .spec-label {
          font-weight: 600;
          color: #1f2328;
        }

        .tier-price {
          font-size: 24px;
          font-weight: 700;
          color: #0969da;
          text-align: center;
        }

        .generation-section {
          max-width: 600px;
          margin: 0 auto;
          padding: 24px;
          background: #f6f8fa;
          border: 2px solid #d1d9e0;
          border-radius: 12px;
          opacity: 0;
          animation: fadeInUp 0.6s ease-out 0.7s forwards;
        }

        .gen-title {
          font-size: 15px;
          font-weight: 700;
          color: #1f2328;
          margin-bottom: 16px;
          text-align: center;
        }

        .gen-item {
          display: flex;
          justify-content: space-between;
          padding: 10px 0;
          font-size: 13px;
          border-bottom: 1px solid #d1d9e0;
        }

        .gen-item:last-child {
          border-bottom: none;
          padding-top: 16px;
          margin-top: 8px;
          border-top: 2px solid #d1d9e0;
          font-weight: 600;
        }

        .gen-label {
          color: #656d76;
        }

        .gen-value {
          color: #1f2328;
          font-weight: 600;
        }

        .gen-item:last-child .gen-label {
          color: #1f2328;
        }

        .gen-item:last-child .gen-value {
          color: #0969da;
          font-size: 14px;
        }

        @keyframes fadeInUp {
          from {
            opacity: 0;
            transform: translateY(12px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        @media (prefers-color-scheme: dark) {
          .container {
            background: #0d1117;
          }

          .section-title, .tier-name, .spec-label, .gen-title, .gen-value {
            color: #e6edf3;
          }

          .tier, .generation-section {
            background: #161b22;
            border-color: #30363d;
          }

          .tier.featured {
            border-color: #3fb950;
            box-shadow: 0 8px 24px rgba(63, 185, 80, 0.15);
          }

          .tier-badge {
            color: #3fb950;
          }

          .tier-specs li {
            color: #8b949e;
            border-bottom-color: #30363d;
          }

          .tier-price {
            color: #58a6ff;
          }

          .gen-item {
            border-bottom-color: #30363d;
          }

          .gen-item:last-child {
            border-top-color: #30363d;
          }

          .gen-label {
            color: #8b949e;
          }

          .gen-item:last-child .gen-label {
            color: #e6edf3;
          }

          .gen-item:last-child .gen-value {
            color: #58a6ff;
          }
        }
      </style>
      <div class="container">
        <div class="section-title">TRAINING COSTS</div>
        <div class="tiers">
          <div class="tier">
            <span class="tier-icon">💵</span>
            <div class="tier-name">Budget</div>
            <div class="tier-badge"></div>
            <ul class="tier-specs">
              <li><span class="spec-label">Steps:</span> 500</li>
              <li><span class="spec-label">Images:</span> 10</li>
              <li><span class="spec-label">Time:</span> ~8 min</li>
            </ul>
            <div class="tier-price">$0.75</div>
          </div>

          <div class="tier featured">
            <span class="tier-icon">💰</span>
            <div class="tier-name">Standard</div>
            <div class="tier-badge">⭐ Recommended</div>
            <ul class="tier-specs">
              <li><span class="spec-label">Steps:</span> 1000</li>
              <li><span class="spec-label">Images:</span> 10-20</li>
              <li><span class="spec-label">Time:</span> ~12-18 min</li>
            </ul>
            <div class="tier-price">$1.50</div>
          </div>

          <div class="tier">
            <span class="tier-icon">💎</span>
            <div class="tier-name">Professional</div>
            <div class="tier-badge"></div>
            <ul class="tier-specs">
              <li><span class="spec-label">Steps:</span> 2000</li>
              <li><span class="spec-label">Images:</span> 20</li>
              <li><span class="spec-label">Time:</span> ~30 min</li>
            </ul>
            <div class="tier-price">$3.00</div>
          </div>
        </div>

        <div class="generation-section">
          <div class="gen-title">GENERATION COSTS</div>
          <div class="gen-item">
            <span class="gen-label">Per image (text-to-image or img2img)</span>
            <span class="gen-value">$0.01-$0.03</span>
          </div>
          <div class="gen-item">
            <span class="gen-label">Example: Training + 100 generations</span>
            <span class="gen-value">$1.50 + $1-3</span>
          </div>
          <div class="gen-item">
            <span class="gen-label">Total project cost</span>
            <span class="gen-value">~$2.50-4.50</span>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
