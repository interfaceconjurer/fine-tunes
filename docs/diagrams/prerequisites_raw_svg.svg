<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #ffffff; }
    .card { fill: #f6f8fa; stroke: #d1d9e0; stroke-width: 2; }
    .title { fill: #1f2328; font-family: system-ui, sans-serif; font-size: 16px; font-weight: 700; }
    .item-title { fill: #1f2328; font-family: system-ui, sans-serif; font-size: 15px; font-weight: 600; }
    .item-desc { fill: #656d76; font-family: system-ui, sans-serif; font-size: 13px; }
    .check-circle { fill: #1a7f37; }
    .check-text { fill: #ffffff; font-family: system-ui, sans-serif; font-size: 14px; font-weight: bold; }

    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; }
      .card { fill: #161b22; stroke: #30363d; }
      .title { fill: #e6edf3; }
      .item-title { fill: #e6edf3; }
      .item-desc { fill: #8b949e; }
      .check-circle { fill: #3fb950; }
    }
  </style>

  <!-- Background -->
  <rect class="bg" width="800" height="420"/>

  <!-- Card -->
  <rect class="card" x="32" y="32" width="736" height="356" rx="12"/>

  <!-- Title -->
  <text class="title" x="400" y="70" text-anchor="middle">✓ CHECKLIST: What You Need to Get Started</text>

  <!-- Item 1: Python -->
  <circle class="check-circle" cx="68" cy="122" r="12"/>
  <text class="check-text" x="68" y="128" text-anchor="middle">✓</text>
  <text class="item-title" x="100" y="125">Python 3.10+</text>
  <text class="item-desc" x="100" y="145">Installed on your system</text>

  <!-- Item 2: Replicate Account -->
  <circle class="check-circle" cx="68" cy="192" r="12"/>
  <text class="check-text" x="68" y="198" text-anchor="middle">✓</text>
  <text class="item-title" x="100" y="195">Replicate Account</text>
  <text class="item-desc" x="100" y="215">With API access (sign up at replicate.com)</text>

  <!-- Item 3: Training Images -->
  <circle class="check-circle" cx="68" cy="262" r="12"/>
  <text class="check-text" x="68" y="268" text-anchor="middle">✓</text>
  <text class="item-title" x="100" y="265">Training Images</text>
  <text class="item-desc" x="100" y="285">2-20 images in your target style (PNG, JPG, JPEG, WebP).</text>
  <text class="item-desc" x="100" y="302">Recommended: 10-20 high-quality images</text>

  <!-- Item 4: Custom Captions -->
  <circle class="check-circle" cx="68" cy="340" r="12"/>
  <text class="check-text" x="68" y="346" text-anchor="middle">✓</text>
  <text class="item-title" x="100" y="343">Custom Captions (Optional)</text>
  <text class="item-desc" x="100" y="363">.txt files with descriptions for each image</text>
</svg>
