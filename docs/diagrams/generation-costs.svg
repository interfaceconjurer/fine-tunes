<svg fill="none" viewBox="0 0 700 850" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        .container {
          font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
          padding: 32px;
          background: #ffffff;
          width: 100%;
          height: 100%;
        }

        .card {
          background: #f6f8fa;
          border: 2px solid #d1d9e0;
          border-radius: 12px;
          padding: 28px;
          max-width: 600px;
          margin: 0 auto;
          opacity: 0;
          animation: fadeInUp 0.6s ease-out forwards;
        }

        .header {
          text-align: center;
          margin-bottom: 24px;
        }

        .price-headline {
          font-size: 28px;
          font-weight: 700;
          color: #0969da;
          margin-bottom: 8px;
        }

        .price-range {
          font-size: 14px;
          color: #656d76;
        }

        .section {
          margin-bottom: 24px;
        }

        .section-title {
          font-size: 14px;
          font-weight: 700;
          color: #1f2328;
          margin-bottom: 12px;
          text-transform: uppercase;
          letter-spacing: 0.5px;
        }

        .modes {
          display: flex;
          gap: 12px;
          margin-bottom: 16px;
        }

        .mode {
          flex: 1;
          background: #ffffff;
          border: 1px solid #d1d9e0;
          border-radius: 8px;
          padding: 16px;
          text-align: center;
        }

        .mode-icon {
          font-size: 24px;
          margin-bottom: 8px;
        }

        .mode-name {
          font-size: 13px;
          font-weight: 600;
          color: #1f2328;
          margin-bottom: 4px;
        }

        .mode-price {
          font-size: 12px;
          color: #0969da;
          font-weight: 600;
        }

        .variables {
          background: #ffffff;
          border: 1px solid #d1d9e0;
          border-radius: 8px;
          padding: 16px;
          margin-bottom: 16px;
        }

        .var-title {
          font-size: 13px;
          font-weight: 600;
          color: #1f2328;
          margin-bottom: 8px;
        }

        .var-list {
          font-size: 12px;
          color: #656d76;
          line-height: 1.6;
        }

        .tip {
          background: #ddf4ff;
          border: 1px solid #54aeff;
          border-radius: 8px;
          padding: 12px 16px;
          margin-bottom: 16px;
        }

        .tip-icon {
          font-weight: bold;
          color: #0969da;
          margin-right: 6px;
        }

        .tip-text {
          font-size: 12px;
          color: #0969da;
          line-height: 1.5;
        }

        .breakdown {
          background: #ffffff;
          border: 1px solid #d1d9e0;
          border-radius: 8px;
          padding: 16px;
        }

        .breakdown-title {
          font-size: 13px;
          font-weight: 600;
          color: #1f2328;
          margin-bottom: 12px;
        }

        .breakdown-row {
          display: flex;
          justify-content: space-between;
          font-size: 13px;
          padding: 6px 0;
          color: #656d76;
        }

        .breakdown-row.total {
          border-top: 2px solid #d1d9e0;
          margin-top: 8px;
          padding-top: 12px;
          font-weight: 700;
          color: #1f2328;
          font-size: 14px;
        }

        @keyframes fadeInUp {
          from {
            opacity: 0;
            transform: translateY(12px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        @media (prefers-color-scheme: dark) {
          .container {
            background: #0d1117;
          }

          .card {
            background: #161b22;
            border-color: #30363d;
          }

          .price-headline {
            color: #58a6ff;
          }

          .price-range,
          .var-list,
          .breakdown-row {
            color: #8b949e;
          }

          .section-title,
          .mode-name,
          .var-title,
          .breakdown-title {
            color: #e6edf3;
          }

          .mode,
          .variables,
          .breakdown {
            background: #0d1117;
            border-color: #30363d;
          }

          .mode-price {
            color: #58a6ff;
          }

          .tip {
            background: rgba(88, 166, 255, 0.1);
            border-color: #1f6feb;
          }

          .tip-icon,
          .tip-text {
            color: #58a6ff;
          }

          .breakdown-row.total {
            border-top-color: #30363d;
            color: #e6edf3;
          }
        }
      </style>
      <div class="container">
        <div class="card">
          <div class="header">
            <div class="price-headline">$0.01 - $0.03</div>
            <div class="price-range">Per Image</div>
          </div>

          <div class="section">
            <div class="section-title">Generation Modes</div>
            <div class="modes">
              <div class="mode">
                <div class="mode-icon">💳</div>
                <div class="mode-name">Text-to-Image</div>
                <div class="mode-price">~$0.01-0.03/image</div>
              </div>
              <div class="mode">
                <div class="mode-icon">🔄</div>
                <div class="mode-name">Image-to-Image</div>
                <div class="mode-price">~$0.01-0.03/image</div>
              </div>
            </div>
          </div>

          <div class="section">
            <div class="variables">
              <div class="var-title">Variables that affect cost:</div>
              <div class="var-list">
                • Resolution (higher = more cost)<br/>
                • Inference steps (more = more cost)<br/>
                • Number of outputs
              </div>
            </div>
          </div>

          <div class="section">
            <div class="tip">
              <span class="tip-icon">💡 Pro Tip:</span>
              <span class="tip-text">Generate 4 images at once (--num-outputs 4) to see variations without extra API overhead!</span>
            </div>
          </div>

          <div class="section">
            <div class="breakdown">
              <div class="breakdown-title">📊 Example Cost Breakdown:</div>
              <div class="breakdown-row">
                <span>Training (1000 steps)</span>
                <span>$1.50</span>
              </div>
              <div class="breakdown-row">
                <span>+ 100 generations</span>
                <span>$1.00-3.00</span>
              </div>
              <div class="breakdown-row total">
                <span>Total project cost</span>
                <span>~$2.50-4.50</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
