<svg fill="none" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        .container {
          font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
          padding: 32px;
          background: #ffffff;
          width: 100%;
          height: 100%;
        }

        .card {
          background: #f6f8fa;
          border: 2px solid #d1d9e0;
          border-radius: 12px;
          padding: 28px;
        }

        .card-title {
          font-size: 16px;
          font-weight: 700;
          color: #1f2328;
          margin-bottom: 24px;
          text-align: center;
          letter-spacing: 0.5px;
        }

        .checklist {
          display: flex;
          flex-direction: column;
          gap: 20px;
        }

        .checklist-item {
          display: flex;
          gap: 16px;
          opacity: 0;
          animation: fadeInUp 0.5s ease-out forwards;
        }

        .checklist-item:nth-child(1) { animation-delay: 0.1s; }
        .checklist-item:nth-child(2) { animation-delay: 0.2s; }
        .checklist-item:nth-child(3) { animation-delay: 0.3s; }
        .checklist-item:nth-child(4) { animation-delay: 0.4s; }

        .check-icon {
          flex-shrink: 0;
          width: 24px;
          height: 24px;
          background: #1a7f37;
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          color: white;
          font-weight: bold;
          font-size: 14px;
          margin-top: 2px;
        }

        .item-content {
          flex: 1;
        }

        .item-title {
          font-size: 15px;
          font-weight: 600;
          color: #1f2328;
          margin-bottom: 4px;
        }

        .item-desc {
          font-size: 13px;
          color: #656d76;
          line-height: 1.5;
        }

        @keyframes fadeInUp {
          from {
            opacity: 0;
            transform: translateY(8px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        @media (prefers-color-scheme: dark) {
          .container {
            background: #0d1117;
          }

          .card {
            background: #161b22;
            border-color: #30363d;
          }

          .card-title {
            color: #e6edf3;
          }

          .check-icon {
            background: #3fb950;
          }

          .item-title {
            color: #e6edf3;
          }

          .item-desc {
            color: #8b949e;
          }
        }
      </style>
      <div class="container">
        <div class="card">
          <div class="card-title">✓ CHECKLIST: What You Need to Get Started</div>
          <div class="checklist">
            <div class="checklist-item">
              <div class="check-icon">✓</div>
              <div class="item-content">
                <div class="item-title">Python 3.10+</div>
                <div class="item-desc">Installed on your system</div>
              </div>
            </div>
            <div class="checklist-item">
              <div class="check-icon">✓</div>
              <div class="item-content">
                <div class="item-title">Replicate Account</div>
                <div class="item-desc">With API access (sign up at replicate.com)</div>
              </div>
            </div>
            <div class="checklist-item">
              <div class="check-icon">✓</div>
              <div class="item-content">
                <div class="item-title">Training Images</div>
                <div class="item-desc">2-20 images in your target style (PNG, JPG, JPEG, WebP). Recommended: 10-20 high-quality images</div>
              </div>
            </div>
            <div class="checklist-item">
              <div class="check-icon">✓</div>
              <div class="item-content">
                <div class="item-title">Custom Captions (Optional)</div>
                <div class="item-desc">.txt files with descriptions for each image</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
