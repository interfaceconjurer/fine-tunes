<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #ffffff; }
    .title { fill: #1f2328; font-family: system-ui, sans-serif; font-size: 16px; font-weight: 700; }
    .tick-value { fill: #1f2328; font-family: system-ui, sans-serif; font-size: 14px; font-weight: 700; }
    .tick-label { fill: #656d76; font-family: system-ui, sans-serif; font-size: 12px; font-weight: 500; }
    .tick-desc { fill: #8b949e; font-family: system-ui, sans-serif; font-size: 11px; }
    .subtitle { fill: #656d76; font-family: system-ui, sans-serif; font-size: 12px; }
    .sweet-spot-value { fill: #1a7f37; font-size: 16px; }
    .sweet-spot-label { fill: #1a7f37; }
    .warning-value { fill: #cf222e; }
    .warning-label { fill: #cf222e; }

    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; }
      .title { fill: #e6edf3; }
      .tick-value { fill: #e6edf3; }
      .tick-label { fill: #8b949e; }
      .tick-desc { fill: #6e7681; }
      .subtitle { fill: #8b949e; }
      .sweet-spot-value { fill: #3fb950; }
      .sweet-spot-label { fill: #3fb950; }
      .warning-value { fill: #f85149; }
      .warning-label { fill: #f85149; }
    }
  </style>

  <defs>
    <linearGradient id="scaleGradientLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d1d9e0"/>
      <stop offset="25%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#1a7f37"/>
      <stop offset="75%" style="stop-color:#d29922"/>
      <stop offset="100%" style="stop-color:#cf222e"/>
    </linearGradient>
    <linearGradient id="scaleGradientDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#30363d"/>
      <stop offset="25%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#3fb950"/>
      <stop offset="75%" style="stop-color:#d29922"/>
      <stop offset="100%" style="stop-color:#f85149"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect class="bg" width="800" height="320"/>

  <!-- Title -->
  <text class="title" x="400" y="50" text-anchor="middle">LoRA Scale Visual Guide</text>

  <!-- Scale Bar (Light mode) -->
  <rect class="light-only" x="50" y="90" width="700" height="40" rx="20" fill="url(#scaleGradientLight)"/>

  <!-- Scale Bar (Dark mode) - Will be shown based on media query -->
  <rect class="dark-only" x="50" y="90" width="700" height="40" rx="20" fill="url(#scaleGradientDark)" style="display: none;"/>

  <!-- Tick 0.0 -->
  <text class="tick-value" x="50" y="170" text-anchor="middle">0.0</text>
  <text class="tick-label" x="50" y="188" text-anchor="middle">No Style</text>
  <text class="tick-desc" x="50" y="202" text-anchor="middle">(Base)</text>

  <!-- Tick 0.5 -->
  <text class="tick-value" x="225" y="170" text-anchor="middle">0.5</text>
  <text class="tick-label" x="225" y="188" text-anchor="middle">Subtle</text>
  <text class="tick-desc" x="225" y="202" text-anchor="middle">Influence</text>

  <!-- Tick 1.0 (Sweet Spot) -->
  <text class="sweet-spot-value" x="400" y="170" text-anchor="middle">1.0</text>
  <text class="sweet-spot-label" x="400" y="188" text-anchor="middle">Sweet Spot ⭐</text>
  <text class="tick-desc" x="400" y="202" text-anchor="middle">Balanced</text>

  <!-- Tick 1.5 -->
  <text class="tick-value" x="575" y="170" text-anchor="middle">1.5</text>
  <text class="tick-label" x="575" y="188" text-anchor="middle">Strong</text>
  <text class="tick-desc" x="575" y="202" text-anchor="middle">Emphasis</text>

  <!-- Tick 2.0 (Warning) -->
  <text class="warning-value" x="750" y="170" text-anchor="middle">2.0</text>
  <text class="warning-label" x="750" y="188" text-anchor="middle">Too Much ⚠️</text>
  <text class="tick-desc" x="750" y="202" text-anchor="middle">Artifacts</text>

  <!-- Subtitle -->
  <text class="subtitle" x="400" y="250" text-anchor="middle">Less Style ←――――――――――――――――――――――――――――――→ More Style</text>

  <style>
    .light-only { display: block; }
    .dark-only { display: none; }

    @media (prefers-color-scheme: dark) {
      .light-only { display: none; }
      .dark-only { display: block; }
    }
  </style>
</svg>
