<svg fill="none" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        .container {
          font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
          padding: 32px;
          background: #ffffff;
          width: 100%;
          height: 100%;
        }

        .title {
          text-align: center;
          font-size: 18px;
          font-weight: 700;
          color: #1f2328;
          margin-bottom: 32px;
          letter-spacing: 0.5px;
        }

        .tiers {
          display: flex;
          gap: 24px;
          justify-content: center;
        }

        .tier {
          flex: 1;
          max-width: 260px;
          background: #f6f8fa;
          border: 2px solid #d1d9e0;
          border-radius: 12px;
          padding: 24px;
          opacity: 0;
          animation: fadeInUp 0.6s ease-out forwards;
        }

        .tier:nth-child(1) { animation-delay: 0.1s; }
        .tier:nth-child(2) { animation-delay: 0.3s; }
        .tier:nth-child(3) { animation-delay: 0.5s; }

        .tier.featured {
          border-color: #1a7f37;
          border-width: 3px;
          transform: scale(1.05);
          box-shadow: 0 8px 24px rgba(26, 127, 55, 0.15);
        }

        .tier-icon {
          font-size: 32px;
          text-align: center;
          margin-bottom: 12px;
          display: block;
        }

        .tier-name {
          font-size: 15px;
          font-weight: 700;
          color: #1f2328;
          text-align: center;
          margin-bottom: 8px;
        }

        .tier-badge {
          text-align: center;
          font-size: 11px;
          font-weight: 600;
          color: #1a7f37;
          margin-bottom: 16px;
          height: 16px;
        }

        .tier-specs {
          list-style: none;
          margin-bottom: 16px;
        }

        .tier-specs li {
          font-size: 13px;
          color: #656d76;
          padding: 6px 0;
          border-bottom: 1px solid #d1d9e0;
        }

        .tier-specs li:last-child {
          border-bottom: none;
        }

        .spec-label {
          font-weight: 600;
          color: #1f2328;
        }

        .tier-price {
          font-size: 28px;
          font-weight: 700;
          color: #0969da;
          text-align: center;
          margin: 16px 0;
        }

        .tier-desc {
          font-size: 12px;
          color: #656d76;
          text-align: center;
          line-height: 1.5;
        }

        .tier-desc strong {
          color: #1f2328;
        }

        @keyframes fadeInUp {
          from {
            opacity: 0;
            transform: translateY(12px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        .tier.featured {
          animation-name: fadeInUpFeatured;
        }

        @keyframes fadeInUpFeatured {
          from {
            opacity: 0;
            transform: scale(1.05) translateY(12px);
          }
          to {
            opacity: 1;
            transform: scale(1.05) translateY(0);
          }
        }

        @media (prefers-color-scheme: dark) {
          .container {
            background: #0d1117;
          }

          .title {
            color: #e6edf3;
          }

          .tier {
            background: #161b22;
            border-color: #30363d;
          }

          .tier.featured {
            border-color: #3fb950;
            box-shadow: 0 8px 24px rgba(63, 185, 80, 0.2);
          }

          .tier-name,
          .spec-label {
            color: #e6edf3;
          }

          .tier-badge {
            color: #3fb950;
          }

          .tier-specs li {
            color: #8b949e;
            border-bottom-color: #30363d;
          }

          .tier-price {
            color: #58a6ff;
          }

          .tier-desc {
            color: #8b949e;
          }

          .tier-desc strong {
            color: #e6edf3;
          }
        }
      </style>
      <div class="container">
        <div class="title">TRAINING COST CALCULATOR</div>
        <div class="tiers">
          <div class="tier">
            <span class="tier-icon">💵</span>
            <div class="tier-name">Budget Option</div>
            <div class="tier-badge"></div>
            <ul class="tier-specs">
              <li><span class="spec-label">Steps:</span> 500</li>
              <li><span class="spec-label">Images:</span> 10</li>
              <li><span class="spec-label">Duration:</span> ~8 min</li>
            </ul>
            <div class="tier-price">$0.75</div>
            <div class="tier-desc">
              <strong>Good for:</strong> Quick experiments, testing workflows
            </div>
          </div>

          <div class="tier featured">
            <span class="tier-icon">💰</span>
            <div class="tier-name">Standard</div>
            <div class="tier-badge">⭐ MOST POPULAR</div>
            <ul class="tier-specs">
              <li><span class="spec-label">Steps:</span> 1000</li>
              <li><span class="spec-label">Images:</span> 10-20</li>
              <li><span class="spec-label">Duration:</span> ~12-18 min</li>
            </ul>
            <div class="tier-price">$1.50</div>
            <div class="tier-desc">
              <strong>Good for:</strong> Most use cases, balanced quality
            </div>
          </div>

          <div class="tier">
            <span class="tier-icon">💎</span>
            <div class="tier-name">Professional</div>
            <div class="tier-badge"></div>
            <ul class="tier-specs">
              <li><span class="spec-label">Steps:</span> 2000</li>
              <li><span class="spec-label">Images:</span> 20</li>
              <li><span class="spec-label">Duration:</span> ~30 min</li>
            </ul>
            <div class="tier-price">$3.00</div>
            <div class="tier-desc">
              <strong>Good for:</strong> Professional work, complex styles
            </div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
