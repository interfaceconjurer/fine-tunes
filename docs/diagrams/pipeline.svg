<svg fill="none" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        .container {
          font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
          padding: 24px;
          background: #ffffff;
          width: 100%;
          height: 100%;
        }

        .pipeline {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 24px;
        }

        .step {
          flex: 1;
          background: #f6f8fa;
          border: 2px solid #d1d9e0;
          border-radius: 12px;
          padding: 20px;
          opacity: 0;
          animation: fadeInUp 0.6s ease-out forwards;
        }

        .step:nth-child(1) { animation-delay: 0.1s; }
        .step:nth-child(2) { animation-delay: 0.3s; }
        .step:nth-child(3) { animation-delay: 0.5s; }

        .arrow {
          font-size: 32px;
          color: #0969da;
          opacity: 0;
          animation: fadeIn 0.4s ease-out forwards;
          flex-shrink: 0;
        }

        .arrow:nth-of-type(1) { animation-delay: 0.25s; }
        .arrow:nth-of-type(2) { animation-delay: 0.45s; }

        .step-icon {
          font-size: 36px;
          text-align: center;
          margin-bottom: 12px;
        }

        .step-title {
          font-size: 14px;
          font-weight: 700;
          color: #0969da;
          margin-bottom: 8px;
          text-align: center;
          letter-spacing: 0.5px;
        }

        .step-details {
          font-size: 12px;
          color: #656d76;
          line-height: 1.6;
          margin-bottom: 12px;
        }

        .step-details div {
          margin-bottom: 4px;
        }

        .command {
          background: #ffffff;
          border: 1px solid #d1d9e0;
          border-radius: 6px;
          padding: 8px;
          font-family: "SF Mono", Monaco, "Cascadia Code", monospace;
          font-size: 10px;
          color: #8250df;
          text-align: center;
          word-break: break-all;
        }

        @keyframes fadeInUp {
          from {
            opacity: 0;
            transform: translateY(12px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        @keyframes fadeIn {
          from { opacity: 0; }
          to { opacity: 1; }
        }

        @media (prefers-color-scheme: dark) {
          .container {
            background: #0d1117;
          }

          .step {
            background: #161b22;
            border-color: #30363d;
          }

          .arrow {
            color: #58a6ff;
          }

          .step-title {
            color: #58a6ff;
          }

          .step-details {
            color: #8b949e;
          }

          .command {
            background: #0d1117;
            border-color: #30363d;
            color: #bc8cff;
          }
        }
      </style>
      <div class="container">
        <div class="pipeline">
          <div class="step">
            <div class="step-icon">🖼️</div>
            <div class="step-title">YOUR IMAGES</div>
            <div class="step-details">
              <div>• 2-20 images in your style</div>
              <div>• Optional .txt captions</div>
              <div>• PNG, JPG, JPEG, WebP</div>
            </div>
            <div class="command">Collect images</div>
          </div>

          <div class="arrow">→</div>

          <div class="step">
            <div class="step-icon">🚀</div>
            <div class="step-title">TRAIN MODEL</div>
            <div class="step-details">
              <div>• 10-20 minutes</div>
              <div>• ~$1.50 for 1000 steps</div>
              <div>• On Replicate</div>
            </div>
            <div class="command">flux_style_finetune.py train</div>
          </div>

          <div class="arrow">→</div>

          <div class="step">
            <div class="step-icon">🎨</div>
            <div class="step-title">GENERATE</div>
            <div class="step-details">
              <div>• Text-to-Image</div>
              <div>• Image-to-Image</div>
              <div>• Unlimited generations</div>
            </div>
            <div class="command">flux_style_finetune.py generate</div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
