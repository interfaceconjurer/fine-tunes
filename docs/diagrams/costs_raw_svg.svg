<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #ffffff; }
    .title { fill: #1f2328; font-family: system-ui, sans-serif; font-size: 16px; font-weight: 700; }
    .box { fill: #f6f8fa; stroke: #d1d9e0; stroke-width: 2; }
    .box-featured { fill: #f6f8fa; stroke: #1a7f37; stroke-width: 3; }
    .tier-name { fill: #1f2328; font-family: system-ui, sans-serif; font-size: 14px; font-weight: 700; }
    .tier-badge { fill: #1a7f37; font-family: system-ui, sans-serif; font-size: 11px; font-weight: 600; }
    .spec-label { fill: #1f2328; font-family: system-ui, sans-serif; font-size: 12px; font-weight: 600; }
    .spec-value { fill: #656d76; font-family: system-ui, sans-serif; font-size: 12px; }
    .price { fill: #0969da; font-family: system-ui, sans-serif; font-size: 24px; font-weight: 700; }
    .icon { font-size: 28px; font-family: system-ui, sans-serif; }
    .gen-title { fill: #1f2328; font-family: system-ui, sans-serif; font-size: 15px; font-weight: 700; }
    .gen-label { fill: #656d76; font-family: system-ui, sans-serif; font-size: 13px; }
    .gen-value { fill: #1f2328; font-family: system-ui, sans-serif; font-size: 13px; font-weight: 600; }
    .gen-total-label { fill: #1f2328; font-family: system-ui, sans-serif; font-size: 13px; font-weight: 600; }
    .gen-total-value { fill: #0969da; font-family: system-ui, sans-serif; font-size: 14px; font-weight: 600; }
    .divider { stroke: #d1d9e0; stroke-width: 1; }

    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; }
      .title, .tier-name, .spec-label, .gen-title, .gen-value, .gen-total-label { fill: #e6edf3; }
      .box { fill: #161b22; stroke: #30363d; }
      .box-featured { fill: #161b22; stroke: #3fb950; }
      .tier-badge { fill: #3fb950; }
      .spec-value, .gen-label { fill: #8b949e; }
      .price { fill: #58a6ff; }
      .gen-total-value { fill: #58a6ff; }
      .divider { stroke: #30363d; }
    }
  </style>

  <!-- Background -->
  <rect class="bg" width="900" height="600"/>

  <!-- Title -->
  <text class="title" x="450" y="50" text-anchor="middle">TRAINING COSTS</text>

  <!-- Tier 1: Budget -->
  <rect class="box" x="50" y="80" width="240" height="220" rx="12"/>
  <text class="icon" x="170" y="130" text-anchor="middle">💵</text>
  <text class="tier-name" x="170" y="155" text-anchor="middle">Budget</text>
  <text class="spec-label" x="80" y="190">Steps:</text>
  <text class="spec-value" x="250" y="190" text-anchor="end">500</text>
  <line class="divider" x1="70" y1="198" x2="270" y2="198"/>
  <text class="spec-label" x="80" y="220">Images:</text>
  <text class="spec-value" x="250" y="220" text-anchor="end">10</text>
  <line class="divider" x1="70" y1="228" x2="270" y2="228"/>
  <text class="spec-label" x="80" y="250">Time:</text>
  <text class="spec-value" x="250" y="250" text-anchor="end">~8 min</text>
  <text class="price" x="170" y="285" text-anchor="middle">$0.75</text>

  <!-- Tier 2: Standard (Featured) -->
  <rect class="box-featured" x="330" y="70" width="240" height="240" rx="12"/>
  <text class="icon" x="450" y="120" text-anchor="middle">💰</text>
  <text class="tier-name" x="450" y="145" text-anchor="middle">Standard</text>
  <text class="tier-badge" x="450" y="165" text-anchor="middle">⭐ Recommended</text>
  <text class="spec-label" x="360" y="200">Steps:</text>
  <text class="spec-value" x="530" y="200" text-anchor="end">1000</text>
  <line class="divider" x1="350" y1="208" x2="550" y2="208"/>
  <text class="spec-label" x="360" y="230">Images:</text>
  <text class="spec-value" x="530" y="230" text-anchor="end">10-20</text>
  <line class="divider" x1="350" y1="238" x2="550" y2="238"/>
  <text class="spec-label" x="360" y="260">Time:</text>
  <text class="spec-value" x="530" y="260" text-anchor="end">~12-18 min</text>
  <text class="price" x="450" y="295" text-anchor="middle">$1.50</text>

  <!-- Tier 3: Professional -->
  <rect class="box" x="610" y="80" width="240" height="220" rx="12"/>
  <text class="icon" x="730" y="130" text-anchor="middle">💎</text>
  <text class="tier-name" x="730" y="155" text-anchor="middle">Professional</text>
  <text class="spec-label" x="640" y="190">Steps:</text>
  <text class="spec-value" x="810" y="190" text-anchor="end">2000</text>
  <line class="divider" x1="630" y1="198" x2="830" y2="198"/>
  <text class="spec-label" x="640" y="220">Images:</text>
  <text class="spec-value" x="810" y="220" text-anchor="end">20</text>
  <line class="divider" x1="630" y1="228" x2="830" y2="228"/>
  <text class="spec-label" x="640" y="250">Time:</text>
  <text class="spec-value" x="810" y="250" text-anchor="end">~30 min</text>
  <text class="price" x="730" y="285" text-anchor="middle">$3.00</text>

  <!-- Generation Section -->
  <rect class="box" x="150" y="360" width="600" height="200" rx="12"/>
  <text class="gen-title" x="450" y="395" text-anchor="middle">GENERATION COSTS</text>

  <!-- Gen item 1 -->
  <text class="gen-label" x="180" y="430">Per image (text-to-image or img2img)</text>
  <text class="gen-value" x="710" y="430" text-anchor="end">$0.01-$0.03</text>
  <line class="divider" x1="170" y1="440" x2="730" y2="440"/>

  <!-- Gen item 2 -->
  <text class="gen-label" x="180" y="475">Example: Training + 100 generations</text>
  <text class="gen-value" x="710" y="475" text-anchor="end">$1.50 + $1-3</text>
  <line class="divider" x1="170" y1="485" x2="730" y2="485"/>
  <line class="divider" x1="170" y1="487" x2="730" y2="487"/>

  <!-- Gen total -->
  <text class="gen-total-label" x="180" y="525">Total project cost</text>
  <text class="gen-total-value" x="710" y="525" text-anchor="end">~$2.50-4.50</text>
</svg>
